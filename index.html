<!DOCTYPE html>
<html>
<head>
    <title>Product Search App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f9;
            padding: 20px;
        }
        .product-card {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .card-body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <h1 class="my-4">Product Search App</h1>

        <div class="row g-2 justify-content-center mb-4">
            <div class="col-auto">
                <select id="categorySelect" class="form-select" onclick="filterProducts()">
                    <option value="all">All Categories</option>
                    <option value="clothes">Clothes</option>
                    <option value="caps">Caps</option>
                    <option value="watches">Watches</option>
                    <option value="glases">Glases</option>
                    <option value="shoes">Shoes</option>
                </select>
            </div>
        </div>

        <div id="productsGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4"></div>
    </div>

                price: "$70",
                image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400"
            }
        ]

        function displayProducts(filteredList) {
            var grid = document.getElementById("productsGrid")
            grid.innerHTML = ""

            var i = 0
            while (i < filteredList.length) {
                var item = filteredList[i]
                
                grid.innerHTML = grid.innerHTML + `
                    <div class="col d-flex align-items-stretch">
                        <div class="card product-card text-start shadow-sm w-100">
                            <img src="${item.image}" class="card-img-top" alt="${item.name}">
                            <div class="card-body">
                                <div>
                                    <h5 class="card-title text-truncate">${item.name}</h5>
                                    <h6 class="card-subtitle mb-3 text-muted text-uppercase small">${item.category}</h6>
                                </div>
                                <p class="card-text fw-bold text-success fs-5 mb-0">${item.price}</p>
                            </div>
                        </div>
                    </div>
                `
                i = i + 1
            }
        }

        function filterProducts() {
            var selectedCat = document.getElementById("categorySelect").value
            var newList = []

            var i = 0
            while (i < products.length) {
                var item = products[i]
                var matchesCategory = (selectedCat === "all" || item.category === selectedCat)

                if (matchesCategory) {
                    newList.push(item)
                }
                i = i + 1
            }

            displayProducts(newList)
        }

        displayProducts(products)
    </script>

</body>
